name: Deploy to Lolipop

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Lolipop
        uses: lolipop-mc/lolipop-mc-dispatch-action@v1
        with:
          api-key: ${{ secrets.LOLIPOP_MC_API_KEY }}

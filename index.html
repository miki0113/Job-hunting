<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活リスト - 同期機能付き</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; margin: auto; }
        h2 { text-align: center; color: #333; font-size: 14px; margin-bottom: 20px; }
        .table-scroll { width: 100%; overflow-x: auto; margin-bottom: 10px; border-bottom: 1px solid #ccc; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #999; padding: 8px; text-align: center; font-size: 12px; }
        th { background-color: #eee; }
        .footer-links { text-align: center; font-size: 12px; margin: 20px 0; color: #0000ee; }
        .memo-area { border: 1px dashed #999; padding: 15px; font-size: 12px; margin-bottom: 40px; }
        .sync-section { border-top: 1px solid #ccc; padding-top: 25px; text-align: center; }
        .file-controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .btn { padding: 6px 12px; border: 1px solid #999; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; background: #fff; }
        .file-select { padding: 5px; font-size: 12px; min-width: 220px; border: 1px solid #999; }
        .status-msg { font-size: 12px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>就活で気になった企業リスト</h2>

    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">番号</th>
                    <th style="width: 30%;">企業名</th>
                    <th style="width: 30%;">通勤・最寄り駅</th>
                    <th style="width: 30%;">メモ</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>1</td><td>三郷市役所</td><td>三郷駅</td><td>終</td></tr>
                </tbody>
        </table>
    </div>

    <div class="sync-section">
        <strong>■ 提出書類 同期（履歴書・職務経歴書）</strong>
        <div class="file-controls">
            <input type="file" id="common-upload" style="display:none;" onchange="handleUpload(this)">
            <button class="btn" onclick="document.getElementById('common-upload').click()">📤 ファイルをUP</button>
            <select id="common-select" class="file-select">
                <option value="">-- 保存済みファイルを選択 --</option>
            </select>
            <button class="btn" onclick="handleDownload()">📥 ダウンロード</button>
        </div>
        <div id="status-msg" class="status-msg"></div>
    </div>
</div>

<script>
    window.onload = refreshFileList;

    async function refreshFileList() {
        try {
            const res = await fetch('/api/list');
            const data = await res.json();
            const sel = document.getElementById('common-select');
            sel.innerHTML = '<option value="">-- 保存済みファイルを選択 --</option>';
            
            const list = data.blobs || [];
            list.forEach(blob => {
                const opt = document.createElement('option');
                opt.value = blob.url;
                opt.innerText = decodeURIComponent(blob.pathname);
                sel.appendChild(opt);
            });
        } catch (e) { console.error("一覧取得エラー"); }
    }

    async function handleUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const msg = document.getElementById('status-msg');
        msg.style.color = "#0000ee";
        msg.innerText = "同期中...";
                
        try {
            const res = await fetch(`/api/upload?filename=${encodeURIComponent(file.name)}`, {
                method: 'POST',
                body: file,
            });
                        
            if (res.ok) {
                msg.style.color = "#28a745";
                msg.innerText = "✅ 同期完了しました";
                await refreshFileList();
            } else {
                const errorDetail = await res.text();
                msg.style.color = "#d93025";
                // ここで詳細な理由を表示します！
                msg.innerText = `❌ 失敗: ${res.status} ${errorDetail}`;
            }
        } catch (e) {
            msg.style.color = "#d93025";
            msg.innerText = "❌ 通信エラー";
        }
    }

    function handleDownload() {
        const url = document.getElementById('common-select').value;
        if (url) window.open(url, '_blank');
        else alert("ファイルを選択してください");
    }
</script>
</body>
</html>

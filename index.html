<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提出書類管理</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; }
        .section { margin-bottom: 30px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        select, button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; }
        .delete-btn { background-color: #ffebee; color: #c62828; border: 1px solid #c62828; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>■ 提出書類 同期（履歴書・職務経歴書など）</h2>

        <div class="section">
            <input type="file" id="file-input">
            <button onclick="handleUpload()">📤 アップロード</button>
        </div>

        <div class="section">
            <select id="common-select">
                <option value="">-- 保存済みファイルを選択 --</option>
            </select>
            <button onclick="handleView()">📄 表示 / ダウンロード</button>
            <button class="delete-btn" onclick="handleDelete()">🗑️ 選択したファイルを完全に消す</button>
        </div>
    </div>

    <script>
        async function loadFileList() {
            const res = await fetch('/api/files');
            const files = await res.json();
            const select = document.getElementById('common-select');
            select.innerHTML = '<option value="">-- 保存済みファイルを選択 --</option>';
            files.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file;
                opt.textContent = file;
                select.appendChild(opt);
            });
        }

        async function handleUpload() {
            const input = document.getElementById('file-input');
            if (!input.files[0]) return alert('ファイルを選択してください');
            
            const formData = new FormData();
            formData.append('file', input.files[0]);

            await fetch('/api/upload', { method: 'POST', body: formData });
            input.value = '';
            loadFileList();
        }

        async function handleView() {
            const name = document.getElementById('common-select').value;
            if (!name) return alert('ファイルを選択してください');

            const fileUrl = window.location.origin + '/PDF/' + encodeURIComponent(name);

            // Wordファイルの場合はMicrosoftビューアー経由、それ以外は直接表示
            if (name.endsWith('.docx') || name.endsWith('.doc')) {
                const officeUrl = "https://view.officeapps.live.com/op/view.aspx?src=" + encodeURIComponent(fileUrl);
                window.open(officeUrl, '_blank');
            } else {
                window.open(fileUrl, '_blank');
            }
        }

        async function handleDelete() {
            const name = document.getElementById('common-select').value;
            if (!name) return alert('ファイルを選択してください');
            if (!confirm('本当に削除しますか？')) return;

            await fetch('/api/files/' + encodeURIComponent(name), { method: 'DELETE' });
            loadFileList();
        }

        loadFileList();
    </script>
</body>
</html>

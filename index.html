<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活管理メモ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; margin: auto; }
        h2 { text-align: center; color: #333; }
        
        /* 共通書類エリアのスタイル */
        .common-files { 
            background: #eef6ff; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border: 1px solid #b3d7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .file-controls { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; font-size: 13px; }
        th { background-color: #eee; }

        .btn { padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-up { background-color: #28a745; color: white; }
        .btn-dl { background-color: #007bff; color: white; }
        .file-select { padding: 6px; font-size: 13px; min-width: 200px; }
        .status-msg { font-size: 12px; font-weight: bold; }

        @media screen and (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            th { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; }
            td { border: none; text-align: left; padding: 5px; padding-left: 50%; position: relative; }
            td:before { content: attr(data-label); position: absolute; left: 10px; font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>就活管理メモ</h2>

    <div class="common-files">
        <strong style="color: #0056b3;">📄 共通提出書類（履歴書・職務経歴書など）</strong>
        <div class="file-controls">
            <input type="file" id="common-upload" style="display:none;" onchange="handleUpload(this)">
            <button class="btn btn-up" onclick="document.getElementById('common-upload').click()">📤 ファイルをUP</button>
            
            <select id="common-select" class="file-select">
                <option value="">-- 保存済みファイルを選択 --</option>
            </select>
            
            <button class="btn btn-dl" onclick="handleDownload()">📥 ダウンロード</button>
        </div>
        <div id="status-msg" class="status-msg"></div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>番号</th>
                <th>企業名（サイト名）</th>
                <th>通勤時間（最寄り駅）</th>
                <th>メモ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td data-label="番号">1</td>
                <td data-label="企業名（サイト名）">三陽機器株式会社</td>
                <td data-label="通勤時間（最寄り駅）">35分</td>
                <td data-label="メモ">4/30応募済</td>
            </tr>
            </tbody>
    </table>
</div>

<script>
    window.onload = refreshFileList;

    async function refreshFileList() {
        try {
            const res = await fetch('/api/list');
            const data = await res.json();
            const sel = document.getElementById('common-select');
            
            sel.innerHTML = '<option value="">-- 保存済みファイルを選択 --</option>';
            data.blobs.forEach(blob => {
                const opt = document.createElement('option');
                opt.value = blob.url;
                opt.innerText = decodeURIComponent(blob.pathname);
                sel.appendChild(opt);
            });
        } catch (e) { console.error(e); }
    }

    async function handleUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const msg = document.getElementById('status-msg');
        msg.style.color = "#666";
        msg.innerText = "同期中...";

        try {
            const res = await fetch(`/api/upload?filename=${encodeURIComponent(file.name)}`, {
                method: 'POST',
                body: file,
            });
            if (res.ok) {
                msg.style.color = "#28a745";
                msg.innerText = "✅ 最新の書類を同期しました！";
                await refreshFileList();
            } else { msg.innerText = "❌ 失敗"; }
        } catch (e) { msg.innerText = "❌ エラー"; }
    }

    function handleDownload() {
        const url = document.getElementById('common-select').value;
        if (url) {
            window.open(url, '_blank');
        } else {
            alert("ダウンロードしたい書類をリストから選んでください");
        }
    }
</script>

</body>
</html>

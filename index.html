<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活メモ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; margin: auto; }
        h2 { text-align: center; color: #333; font-size: 14px; margin-bottom: 20px; }
        .table-scroll { width: 100%; overflow-x: auto; margin-bottom: 10px; border-bottom: 1px solid #ccc; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #999; padding: 8px; text-align: center; font-size: 11px; }
        th { background-color: #eee; }
        .footer-links { text-align: center; font-size: 12px; margin: 20px 0; color: #0000ee; }
        .memo-area { border: 1px dashed #999; padding: 15px; font-size: 12px; margin-bottom: 40px; }
        .sync-section { border-top: 1px solid #ccc; padding-top: 25px; text-align: center; }
        .sync-controls { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btn { padding: 8px 24px; border: 1px solid #999; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; background: #fff; display: inline-flex; align-items: center; justify-content: center; min-width: 200px; color: #333; }
        .btn-delete { color: #cc0000; border-color: #cc0000; }
        .file-select { padding: 10px; font-size: 13px; width: 340px; border: 1px solid #999; border-radius: 4px; background: #fff; }
        #status-msg { font-size: 12px; color: #d00; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>就活リスト</h2>
    <div class="table-scroll">
        <table>
            <thead>
                <tr>
                    <th style="width: 5%;">#</th>
                    <th style="width: 35%;">企業名</th>
                    <th style="width: 30%;">最寄り</th>
                    <th style="width: 30%;">メモ</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>1</td><td>三郷市役所</td><td>三郷駅</td><td>終</td></tr>
                <tr><td>2</td><td>MS&ADグランアシスタンス</td><td></td><td></td></tr>
                <tr><td>3</td><td>東京都ビジネスサービス</td><td></td><td>紹介期限：R8/5/31</td></tr>
                <tr><td>4</td><td>医療法人 弘仁会 板倉病院</td><td></td><td>紹介期限：R8/5/31</td></tr>
                <tr><td>5</td><td>ベンチャーサポート社労士法人</td><td></td><td>紹介期限：R8/6/30</td></tr>
                <tr><td>6</td><td>株式会社 日警保安 東京事業部</td><td></td><td>紹介期限：R8/6/30</td></tr>
                <tr><td>7</td><td>株式会社 ハンデックス 仙台支店</td><td></td><td>紹介期限：R8/6/30</td></tr>
                <tr><td>8</td><td></td><td></td><td>紹介期限：R8/6/30</td></tr>
                <tr><td>9</td><td></td><td></td><td>紹介期限：R8/5/31</td></tr>
            </tbody>
        </table>
    </div>

    <div class="sync-section">
        <strong>■ 提出書類 同期（全端末共通リスト）</strong>
        <div class="sync-controls">
            <input type="file" id="common-upload" style="display:none;" onchange="handleUpload(this)">
            <button type="button" class="btn" onclick="document.getElementById('common-upload').click()">☁️ ファイルを新しくUP</button>
            
            <select id="common-select" class="file-select">
                <option value="">-- リスト更新中 --</option>
            </select>
            
            <button class="btn" onclick="handleDownload()">📥 表示 / ダウンロード</button>
            <button class="btn btn-delete" onclick="handleDelete()">🗑️ このファイルを完全に消す</button>
        </div>
        <div id="status-msg"></div>
    </div>
</div>

<script>
    // ページを開いた時と、3秒ごとにリストを自動更新して同期を確実にします
    window.onload = refreshFileList;
    setInterval(refreshFileList, 3000);

    async function handleUpload(input) {
        if (!input.files[0]) return;
        const status = document.getElementById('status-msg');
        status.style.color = "#00f";
        status.innerHTML = "⌛ UP中...";
        
        const file = input.files[0];
        const formData = new FormData();
        formData.append('pdfFile', file);

        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            if (res.ok) {
                status.innerHTML = "✅ UP成功！";
                setTimeout(refreshFileList, 500); 
            }
        } catch (e) { status.innerHTML = "❌ UP失敗"; }
        input.value = '';
    }

    async function refreshFileList() {
        try {
            // キャッシュを無視して最新のリストを強制取得
            const res = await fetch('/api/files?t=' + Date.now());
            const data = await res.json();
            const sel = document.getElementById('common-select');
            const currentVal = sel.value;
            
            sel.innerHTML = '<option value="">-- 保存済みファイルを選択 --</option>';
            data.forEach(name => {
                if (!name.startsWith('.') && name !== 'index.html' && name !== '.gitkeep') {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.innerText = name; 
                    sel.appendChild(opt);
                }
            });
            if (currentVal) sel.value = currentVal;
        } catch (e) { console.error("List update failed"); }
    }

    function handleDownload() {
        const name = document.getElementById('common-select').value;
        if (!name) return alert("ファイルを選んでください");
        window.open('/PDF/' + encodeURIComponent(name), '_blank');
    }

    async function handleDelete() {
        const name = document.getElementById('common-select').value;
        if (!name) return alert("消したいファイルを選んでください");

        if (confirm(`「${name}」をサーバーから完全に消去しますか？\n(PC・スマホ両方から消えます)`)) {
            const status = document.getElementById('status-msg');
            try {
                // 確実にサーバーに届くように送信
                const res = await fetch('/delete?name=' + encodeURIComponent(name), { method: 'DELETE' });
                if (res.ok) {
                    status.style.color = "#d00";
                    status.innerHTML = "🗑️ 削除完了";
                    await refreshFileList();
                } else {
                    alert("削除に失敗しました。ファイルが既にない可能性があります。");
                }
            } catch (e) { alert("エラーが発生しました"); }
        }
    }
</script>
</body>
</html>

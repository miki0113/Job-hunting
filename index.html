<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>就活メモ</title>
    <style>
        /* ページ全体を中央に寄せる設定 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            font-family: sans-serif;
            line-height: 1.6; /* 行間を少し広げて読みやすく */
        }

        /* テキストと表をまとめる箱 */
        .content-box {
            text-align: center; /* 中のテキストも表も中央に寄せる */
            max-width: 640px;   /* 横に広がりすぎないように制限 */
            padding: 20px;
        }

        /* テキスト部分のスタイル */
        .intro-text {
            font-size: 16px;    /* 普通の文字サイズ */
            color: #333;        /* 文字の色を少し柔らかい黒に */
            margin-bottom: 20px; /* 表との間に少し隙間を作る */
        }

        /* 表のスタイル */
        table {
            margin: 0 auto;     /* 表自体を中央に */
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #999;
            padding: 10px;
        }
        th {
            background-color: #eee;
        }
    </style>
</head>
<body>

    <div class="content-box">
        <!-- 1. 最初のテキスト部分 -->
        <p class="intro-text">
            就活で気になった企業リスト
        </p>
        <table>
            <tr>
                <th>番号</th>
                <th>企業名（サイト名）</th>
                <th>通勤時間（最寄り駅）</th>
		<th>メモ</th>
            </tr>
            <tr>
                <td>1</td>
                <td>三郷市役所</td>
                <td>三郷駅（武蔵野線の場合）</td> 
		<td></td>
            </tr>
            <tr>
                <td>2</td>
                <td><a href="https://job-search.litalico.co.jp/companies/116?index=area">ＭＳ&AＤグランアシスタンス株式会社<a/><br>イントラネット</a></td>
                <td></td>
		<td></td>
            </tr>
        </table>

    </div>

      <p><a href="https://www.atgp.jp/">atGP</p></a></td>
</body>
</html>

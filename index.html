<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活管理メモ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h2 { text-align: center; color: #333; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        th { background-color: #eee; }

        /* ボタンとセレクトボックスのスタイル */
        .file-box { display: flex; flex-direction: column; gap: 8px; align-items: center; min-width: 180px; }
        .btn { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; }
        
        .btn-up { background-color: #28a745; color: white; }
        .btn-up:hover { background-color: #218838; }
        
        .btn-dl { background-color: #007bff; color: white; }
        .btn-dl:hover { background-color: #0056b3; }

        .file-select { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        .status-msg { font-size: 11px; color: #666; height: 15px; }

        @media screen and (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            th { display: none; }
            tr { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; }
            td { border: none; text-align: left; padding: 5px; }
            td:before { content: attr(data-label); font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>就活書類 管理リスト</h2>
    
    <table>
        <thead>
            <tr>
                <th>企業名</th>
                <th>書類管理（アップロード ＆ 選択DL）</th>
                <th>メモ</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td data-label="企業名">（企業名を入力）</td>
                <td data-label="書類管理">
                    <div class="file-box">
                        <input type="file" id="file-input-1" style="display:none;" onchange="handleUpload(this, 'msg-1', 'sel-1')">
                        <button class="btn btn-up" onclick="document.getElementById('file-input-1').click()">📤 書類をアップロード</button>
                        <div id="msg-1" class="status-msg"></div>

                        <hr style="width:100%; border:0; border-top:1px solid #eee; margin:5px 0;">

                        <select id="sel-1" class="file-select">
                            <option value="">-- 保存済みファイル --</option>
                        </select>
                        <button class="btn btn-dl" onclick="handleDownload('sel-1')">📥 選択してダウンロード</button>
                    </div>
                </td>
                <td data-label="メモ">（メモを入力）</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // ページを開いた時にファイル一覧を取得
    window.onload = refreshLists;

    async function refreshLists() {
        try {
            const res = await fetch('/api/list');
            const data = await res.json();
            const selectors = document.querySelectorAll('.file-select');
            
            selectors.forEach(sel => {
                sel.innerHTML = '<option value="">-- 保存済みファイル --</option>';
                data.blobs.forEach(blob => {
                    const opt = document.createElement('option');
                    opt.value = blob.url;
                    opt.innerText = blob.pathname;
                    sel.appendChild(opt);
                });
            });
        } catch (e) { console.error("一覧取得エラー", e); }
    }

    async function handleUpload(input, msgId, selId) {
        const file = input.files[0];
        if (!file) return;

        const msg = document.getElementById(msgId);
        msg.innerText = "送信中...";
        
        try {
            const res = await fetch(`/api/upload?filename=${encodeURIComponent(file.name)}`, {
                method: 'POST',
                body: file,
            });
            if (res.ok) {
                msg.innerText = "✅ 保存完了！";
                await refreshLists(); // プルダウンを更新
            } else {
                msg.innerText = "❌ 失敗";
            }
        } catch (e) {
            msg.innerText = "❌ エラー";
        }
    }

    function handleDownload(selId) {
        const url = document.getElementById(selId).value;
        if (url) {
            window.open(url, '_blank');
        } else {
            alert("ファイルを選択してください");
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活メモ</title>
    <style>
        /* 基本設定（PC/共通） */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            font-family: sans-serif;
            line-height: 1.5;
        }

        .content-box {
            text-align: center;
            max-width: 1120px; 
            width: 95%;
            padding: 20px 10px;
        }

        .intro-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }

        /* 表の設定 */
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
            table-layout: fixed; /* これを入れると枠を突き抜けなくなります */
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            word-break: break-all;
            font-size: 14px;
        }

        th { background-color: #eee; }

        /* 列の幅（PC用） */
        th:nth-child(1), td:nth-child(1) { width: 40px; }  /* 番号 */
        th:nth-child(2), td:nth-child(2) { width: auto; }  /* 企業名（余白を埋める） */
        th:nth-child(3), td:nth-child(3) { width: 350px; } /* 通勤時間 */
        th:nth-child(4), td:nth-child(4) { width: 250px; } /* メモ */

        .footer-link {
            margin-top: 20px;
        }
        .footer-link a {
            margin: 5px 10px;
            display: inline-block;
            text-decoration: none;
            color: #0066cc;
        }

        .extra-memo {
            margin-top: 30px;
            text-align: left;
            padding: 15px;
            background-color: #fff;
            border: 1px dashed #999;
            border-radius: 8px;
            font-size: 14px;
        }

        /* --- スマホ専用の設定（画面幅が768px以下の時） --- */
        @media screen and (max-width: 768px) {
            body {
                display: block; /* 中央寄せを解除して上から表示 */
                padding: 10px;
            }
            .content-box {
                width: 100%;
                padding: 0;
            }
            /* スマホでは列の幅を自動（おまかせ）にする */
            th:nth-child(1), td:nth-child(1) { width: 30px; } 
            th:nth-child(3), td:nth-child(3) { width: 35% !important; } 
            th:nth-child(4), td:nth-child(4) { width: 30% !important; }
            
            th, td {
                padding: 5px;
                font-size: 11px; /* 文字を小さくして収める */
            }
            .intro-text { font-size: 14px; }
        }
    </style>
</head>
<body>

                        イントラネット

            </tbody>
        </table>

    </div>
</body>
</html>

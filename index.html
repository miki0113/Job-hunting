<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活メモ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; margin: auto; }
        h2 { text-align: center; color: #333; font-size: 14px; margin-bottom: 20px; }
        .table-scroll { width: 100%; overflow-x: auto; margin-bottom: 10px; border-bottom: 1px solid #ccc; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #999; padding: 8px; text-align: center; font-size: 12px; }
        th { background-color: #eee; }
        .memo-area { border: 1px dashed #999; padding: 15px; font-size: 12px; margin-bottom: 40px; }
        .sync-section { border-top: 1px solid #ccc; padding-top: 25px; text-align: center; }
        .btn { padding: 6px 12px; border: 1px solid #999; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; background: #fff; }
        .file-select { padding: 5px; font-size: 12px; min-width: 220px; border: 1px solid #999; }
        #status-msg { font-size: 11px; color: #0000ee; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>就活で気になった企業リスト</h2>
    <div class="table-scroll">
        <table>
            <thead>
                <tr><th style="width: 10%;">番号</th><th style="width: 30%;">企業名（サイト名）</th><th style="width: 30%;">通勤時間（最寄り駅）</th><th style="width: 30%;">メモ</th></tr>
            </thead>
            <tbody>
                <tr><td>3</td><td><a href="/PDF/RAFAA235010202604290932380861669092556543138702.pdf" target="_blank">東京都ビジネスサービス株式会社</a></td><td></td><td></td></tr>
                <tr><td>4</td><td><a href="/PDF/医療法人 弘仁会 板倉病院.pdf" target="_blank">医療法人 弘仁会 板倉病院</a></td><td></td><td></td></tr>
                <tr><td>6</td><td><a href="/PDF/株式会社 日警保安 東京事業部.pdf" target="_blank">株式会社 日警保安 東京事業部</a></td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>

    <div class="memo-area">
        <strong>■ 追記メモ</strong><br><br>
        ・履歴書の添削依頼をスタッフさんに提出済み（4/23）
    </div>

    <div class="sync-section">
        <strong>■ 提出書類 同期（履歴書・職務経歴書など）</strong>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px; flex-wrap: wrap;">
            <input type="file" id="common-upload" style="display:none;" onchange="handleUpload(this)">
            <button type="button" class="btn" onclick="document.getElementById('common-upload').click()">📤 ファイルをUP</button>
            <select id="common-select" class="file-select"></select>
            <button class="btn" onclick="handleDownload()">📥 ダウンロード/表示</button>
        </div>
        <div id="status-msg"></div>
    </div>
</div>

<script>
    window.onload = refreshFileList;
    async function handleUpload(input) {
        if (!input.files[0]) return;
        const status = document.getElementById('status-msg');
        status.innerHTML = "⌛ アップロード中...";
        const formData = new FormData();
        formData.append('pdfFile', input.files[0]);
        try {
            const res = await fetch('/upload', { method: 'POST', body: formData });
            if (res.ok) {
                status.innerHTML = "アップロード成功！";
                await refreshFileList();
                document.getElementById('common-select').value = input.files[0].name;
            }
        } catch (e) { status.innerHTML = "❌ エラー"; }
    }
    async function refreshFileList() {
        const res = await fetch('/api/files');
        const data = await res.json();
        const sel = document.getElementById('common-select');
        const current = sel.value;
        sel.innerHTML = '<option value="">-- 保存済みファイルを選択 --</option>';
        data.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.innerText = name;
            sel.appendChild(opt);
        });
        if (current) sel.value = current;
    }
    function handleDownload() {
        const name = document.getElementById('common-select').value;
        if (name) window.open('/PDF/' + encodeURIComponent(name), '_blank');
    }
</script>
</body>
</html>

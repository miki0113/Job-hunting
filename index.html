<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>就活メモ</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            font-family: sans-serif;
            line-height: 1.6;
        }
        .content-box {
            text-align: center;
            max-width: 800px;   /* 表が広がるので、全体の最大幅も少し広げました */
            padding: 20px;
        }
        .intro-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #999;
            padding: 10px;
        }
        th {
            background-color: #eee;
        }
        
    /* 3つ目の列（通勤時間）の設定 */
        th:nth-child(3), td:nth-child(3) {
            width: 270px; 
        }

        /* 【ここを追加！】4つ目の列（メモ）を広くする */
        th:nth-child(4), td:nth-child(4) {
            width: 250px; /* お好みの長さに調整してください */
        }

        .footer-link {
            margin-top: 20px;
            text-align: center;
        }
        .footer-link a {
            margin: 0 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="content-box">
        <p class="intro-text">就活で気になった企業リスト</p>
        <table>
            <tr>
                <th>番号</th>
                <th>企業名（サイト名）</th>
                <th>通勤時間（最寄り駅）</th>
                <th>メモ</th>
            </tr>
            <tr>
                <td>1</td>
                <td>三郷市役所</td>
                <td>三郷駅（武蔵野線の場合）</td>
                <td>終</td>
            </tr>
            <tr>
                <td>2</td>
                <td>
                    <a href="https://job-search.litalico.co.jp/companies/116?index=area" target="_blank" rel="noopener noreferrer">ＭＳ&AＤグランアシスタンス株式会社</a><br>
                    イントラネット
                </td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td>3</td>
                <td>
                    株式会社　千葉興業銀行<br>
                    ハローワーク
                </td>
                <td>JR西千葉駅（１時間5分ぐらい）<br>京成西登戸駅（１時間10分ぐらい）</td>
                <td>紹介期限令和8年6月30日</td>
            </tr>
        </table>

        <p class="footer-link">
            <a href="https://www.atgp.jp/" target="_blank" rel="noopener noreferrer">atGP</a>
            <a href="https://www.clover-navi.com/" target="_blank" rel="noopener noreferrer">クローバーナビ</a>
            <a href="https://doda.jp/challenge/" target="_blank" rel="noopener noreferrer">dodaチャレンジ</a>
            <a href="https://kyushoku.hellowork.mhlw.go.jp/kyushoku/GEAA040010.do?action=initDisp&screenId=GEAA040010" target="_blank" rel="noopener noreferrer">ハローワーク</a>
        </p>
    </div>
</body>
</html>

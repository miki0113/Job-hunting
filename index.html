<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>就活メモ</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            font-family: sans-serif;
            line-height: 1.6;
        }
        .content-box {
            text-align: center;
            max-width: 640px;
            padding: 20px;
        }
        .intro-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #999;
            padding: 10px;
        }
        th {
            background-color: #eee;
        }
        /* リンク用のスタイルを少し調整 */
        .footer-link {
            margin-top: 20px;
            display: block; /* ブロック要素にして、しっかり下に配置 */
        }
    </style>
</head>
<body>

    <div class="content-box">
        <p class="intro-text">
            就活で気になった企業リスト
        </p>

        <table>
            <tr>
                <th>番号</th>
                <th>企業名（サイト名）</th>
                <th>通勤時間（最寄り駅）</th>
                <th>メモ</th>
            </tr>
            <tr>
                <td>1</td>
                <td>三郷市役所</td>
                <td>三郷駅（武蔵野線の場合）</td>
                <td></td>
            </tr>
            <tr>
                <td>2</td>
                <td>
                    <a href="https://job-search.litalico.co.jp/companies/116?index=area">ＭＳ&AＤグランアシスタンス株式会社</a><br>
                    イントラネット
                </td>
                <td></td>
                <td></td>
            </tr>
        </table>

        <p class="footer-link">
            <a href="https://www.atgp.jp/">atGPのサイトはこちら</a>
        </p>
    </div>

</body>
</html>
